# --- General Settings ---
# Change prefix to C-a (easier to reach than C-b)
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Faster command delay (improves Vim responsiveness)
set -s escape-time 0

# Increase scrollback buffer size
set -g history-limit 50000

# Start window and pane numbering at 1 (easier for keyboard shortcuts)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows automatically when one is closed
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# --- Key Bindings ---
# Use | and - for splitting panes (more intuitive)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Reload config with 'r'
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# --- Visual ---
# Support for 256 colors
set -g default-terminal "screen-256color"

# Status bar styling
set -g status-style bg=default,fg=white
set -g status-left-length 40
set -g status-left "#[fg=green]Session: #S #[fg=white]| "
set -g status-right "#[fg=cyan]%d %b %R"

# Highlight active window
set-window-option -g window-status-current-style bg=blue,fg=white,bold
